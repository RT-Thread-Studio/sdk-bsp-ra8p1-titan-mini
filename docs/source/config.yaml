# SDK 文档构建配置文件
project:
  name: "Titan-Board-Mini SDK"
  title: "Titan-Board-Mini"
  description: "Titan Board Mini 开发板是 RT-Thread 推出基于瑞萨 Cortex-M85 与 Cortex-M33 双核架构 R7KA8P1 芯片，为工程师们提供了一个灵活、全面的开发平台，助力开发者在嵌入式物联网领域获得更深层次的体验。"
  description_en: "The Titan Board Mini, developed by RT-Thread, is built on Renesas' R7KA8P1 chip featuring a dual-core architecture of Cortex-M85 and Cortex-M33. It offers engineers a flexible and comprehensive development platform, empowering developers to gain deeper expertise in the embedded IoT field."
  version: "1.0.0"
  author: "Hydevcode"
  copyright: "Copyright (c) 2006-2025, RT-Thread Development Team"
  # language: "zh_CN"
  website: "www.rt-thread.org"

# 仓库配置
repository:
  name: "sdk-bsp-ra8p1-titan-board-mini"
  projects_dir: "../../project"
  docs_dir: "."

# 文档分类配置
categories:
  start:
    name: "快速上手"
    name_en: "Getting Started"
    description: "快速上手"
    patterns:
      - "Titan_Mini_template"

  basic:
    name: "基础篇"
    name_en: "Basics"
    description: "基础功能示例"
    patterns:
      - "Titan_Mini_blink_led"
      - "Titan_Mini_key_irq"

  driver:
    name: "驱动篇"
    name_en: "Drivers"
    description: "外设驱动示例"
    patterns:
      - "Titan_Mini_driver_adc"
      - "Titan_Mini_driver_canfd"
      - "Titan_Mini_driver_eth"
      - "Titan_Mini_driver_gpt"
      - "Titan_Mini_driver_rtc"
      - "Titan_Mini_driver_sdcard"
      - "Titan_Mini_driver_sdram"
      - "Titan_Mini_driver_spi"
      - "Titan_Mini_driver_wdt"

  component:
    name: "组件篇"
    name_en: "Components"
    description: "组件示例"
    patterns:
      - "Titan_Mini_component_flash_fs"

  multimedia:
    name: "多媒体显示篇"
    name_en: "Multimedia Display"
    description: "多媒体显示示例"
    patterns:
      - "Titan_Mini_camera_ceu"
      - "Titan_Mini_display_camera_mipi_csi"
      - "Titan_Mini_display_rgb_lvgl"

  peripheral:
    name: "外设扩展篇"
    name_en: "Peripherals"
    description: "外部外设扩展示例"
    patterns:
      - "Titan_Mini_peripheral_imu"
      - "Titan_Mini_rgb_lcd"
      - "Titan_Mini_usb_pcdc"
      - "Titan_Mini_wavplayer"

# 文档生成配置
generation:
  copy_files:
    - "README.md"
    - "README_zh.md"
  copy_dirs:
    - "figures"
  output_structure:
    - "start"
    - "basic"
    - "driver"
    - "component"
    - "multimedia"
    - "peripheral"

# Sphinx 配置
sphinx:
  theme: "sphinx_rtd_theme"
  extensions:
    - "myst_parser"
  source_suffix:
    ".rst": "restructuredtext"
    ".md": "markdown"
  myst_extensions:
    - "colon_fence"
    - "deflist"
    - "dollarmath"
    - "html_image"
    - "html_admonition"
    - "replacements"
    - "smartquotes"
    - "strikethrough"
    - "substitution"
    - "tasklist" 
