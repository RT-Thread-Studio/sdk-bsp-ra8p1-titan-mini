board:
  buy_url_cn: N/A
  buy_url_global: N/A
  debug_interface: SWD
  debugger: J-LINK
  description_en: The Titan Board Mini, developed by RT-Thread, is built on Renesas' R7KA8P1 chip featuring a dual-core architecture of Cortex-M85 and Cortex-M33. It offers engineers a flexible and comprehensive development platform, empowering developers to gain deeper expertise in the embedded IoT field.
  description_zh: Titan Board Mini 开发板是 RT-Thread 推出基于瑞萨 Cortex-M85 与 Cortex-M33 双核架构 R7KA8P1 芯片,为工程师们提供了一个灵活、全面的开发平台,助力开发者在嵌入式物联网领域获得更深层次的体验。
  emulator_machine: ''
  large_image: figures/big.png
  name: Titan-Board-Mini
  price_cn: N/A CNY
  price_global: N/A USD
  sale_contact_cn: https://www.rt-thread.org/
  sale_contact_global: https://www.rt-thread.org/
  small_image: figures/small.png
