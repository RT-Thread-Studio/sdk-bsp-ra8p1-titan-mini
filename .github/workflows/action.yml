name: RA8P1-Titan-Board-Mini

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  # Runs at 16:00 UTC (BeiJing 00:00) on the 1st of every month
  schedule:
    - cron:  '0 16 1 * *'
  push:
    branches:
      - main
    paths-ignore:
      - docs/**
      - '**/README.md'
      # - '**/README_ZH.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - docs/**
      - '**/README.md'
      # - '**/README_ZH.md'
  workflow_dispatch:
    inputs:
      trigger_type:
        description: '触发类型'
        required: false
        default: 'manual'
        type: string

env:
  RTT_TOOL_CHAIN: "sourcery-arm"

jobs:
  check:
    runs-on: ubuntu-latest
    name: check-yaml-format
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@master
        with:
          python-version: 3.8

      - name: Check yaml
        if: ${{ success() }}
        shell: bash
        run: |
          pip install rt-thread-studio
          python -c "from rt_thread_studio import bsp_checker;bsp_path = '.';checker = bsp_checker.BspChecker(bsp_path);checker.check();"

  compile:
    needs: [check]
    runs-on: ubuntu-latest
    name: ${{ matrix.legs.RTT_BSP }}
    strategy:
      fail-fast: false
      matrix:
       legs:
         - {RTT_BSP: "Titan_Mini_blink_led"}
         - {RTT_BSP: "Titan_Mini_component_flash_fs"}
         - {RTT_BSP: "Titan_Mini_display_camera_mipi_csi"}
         - {RTT_BSP: "Titan_Mini_display_rgb_lvgl"}
         - {RTT_BSP: "Titan_Mini_driver_adc"}
         - {RTT_BSP: "Titan_Mini_driver_canfd"}
         - {RTT_BSP: "Titan_Mini_driver_eth"}
         - {RTT_BSP: "Titan_Mini_driver_gpt"}
         - {RTT_BSP: "Titan_Mini_driver_rtc"}
         - {RTT_BSP: "Titan_Mini_driver_sdcard"}
         - {RTT_BSP: "Titan_Mini_driver_sdram"}
         - {RTT_BSP: "Titan_Mini_driver_spi"}
         - {RTT_BSP: "Titan_Mini_driver_wdt"}
         - {RTT_BSP: "Titan_Mini_key_irq"}
         - {RTT_BSP: "Titan_Mini_peripheral_imu"}
         - {RTT_BSP: "Titan_Mini_rgb_lcd"}
         - {RTT_BSP: "Titan_Mini_template"}
         - {RTT_BSP: "Titan_Mini_usb_pcdc"}
         - {RTT_BSP: "Titan_Mini_wavplayer"}
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@master
        with:
          python-version: 3.8

      - name: Install Arm ToolChains
        if: ${{ success() }}
        shell: bash
        run: |
          wget -c https://github.com/RT-Thread/toolchains-ci/releases/download/v1.10/arm-gnu-toolchain-13.3.rel1-x86_64-arm-none-eabi.tar.xz
          sudo tar -xf arm-gnu-toolchain-13.3.rel1-x86_64-arm-none-eabi.tar.xz -C /opt
          /opt/arm-gnu-toolchain-13.3.rel1-x86_64-arm-none-eabi/bin/arm-none-eabi-gcc --version
          echo "RTT_EXEC_PATH=/opt/arm-gnu-toolchain-13.3.rel1-x86_64-arm-none-eabi/bin" >> $GITHUB_ENV

      - name: Install Tools
        if: ${{ success() }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get -qq install gcc-multilib libsdl2-dev scons
          echo "RTT_ROOT=${{ github.workspace }}" >> $GITHUB_ENV
          echo "RTT_CC=gcc" >> $GITHUB_ENV

      - name: Compile ${{ matrix.legs.RTT_BSP }}
        if: ${{ success() }}
        shell: bash
        env:
          RTT_BSP: ${{ matrix.legs.RTT_BSP }}
        run: |
          cd project
          scons -C $RTT_BSP